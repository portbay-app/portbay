[package]
name = "portbay"
version = "0.1.0"
description = "PortBay — lightweight local development environment manager"
authors = ["Tribal House"]
edition = "2021"

[lib]
name = "portbay_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
tauri-plugin-shell = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"
tokio = { version = "1", features = ["rt-multi-thread", "macros", "time", "net"] }
reqwest = { version = "0.12", features = ["json"] }
once_cell = "1"
dirs = "5"
thiserror = "1"
url = "2"

[dev-dependencies]
tempfile = "3"
