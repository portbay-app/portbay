[package]
name = "portbay"
version = "0.1.0"
description = "PortBay — lightweight local development environment manager"
authors = ["Tribal House"]
edition = "2021"
default-run = "portbay-app"

[lib]
name = "portbay_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

# Two bins: the Tauri GUI (loaded into PortBay.app) and the CLI shipped
# alongside. mainBinaryName in tauri.conf.json points at portbay-app.
[[bin]]
name = "portbay-app"
path = "src/main.rs"

[[bin]]
name = "portbay"
path = "src/bin/portbay.rs"

[[bin]]
name = "portbay-hosts-helper"
path = "src/bin/portbay-hosts-helper.rs"

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = ["tray-icon", "image-png"] }
tauri-plugin-shell = "2"
tauri-plugin-opener = "2"
tauri-plugin-dialog = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"
tokio = { version = "1", features = ["rt-multi-thread", "macros", "time", "net", "signal", "process"] }
reqwest = { version = "0.12", features = ["json"] }
once_cell = "1"
dirs = "5"
thiserror = "1"
url = "2"
clap = { version = "4", features = ["derive"] }
clap_complete = "4"
which = "6"
console = "0.15"
sysinfo = "0.30"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
x509-parser = "0.16"
libc = "0.2"

[dev-dependencies]
tempfile = "3"
