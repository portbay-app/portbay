[package]
name = "portbay"
version = "0.1.0"
description = "PortBay — lightweight local development environment manager"
authors = ["Tribal House"]
license = "Apache-2.0"
edition = "2021"
default-run = "portbay-app"

[lib]
name = "portbay_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

# Two bins: the Tauri GUI (loaded into PortBay.app) and the CLI shipped
# alongside. mainBinaryName in tauri.conf.json points at portbay-app.
[[bin]]
name = "portbay-app"
path = "src/main.rs"

[[bin]]
name = "portbay"
path = "src/bin/portbay.rs"

[[bin]]
name = "portbay-hosts-helper"
path = "src/bin/portbay-hosts-helper.rs"

# MCP server — speaks Model Context Protocol over stdio so any MCP-aware
# agent (Claude Code, Cursor, Continue, Zed, …) can drive PortBay. Gated
# behind the `mcp` feature so the default GUI/CLI builds don't compile the
# rmcp/schemars stack. Build with `cargo build --release --features mcp`.
[[bin]]
name = "portbay-mcp"
path = "src/bin/portbay-mcp.rs"
required-features = ["mcp"]

[features]
# Opt-in MCP server bin + its protocol stack. Off by default.
mcp = ["dep:rmcp"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = ["tray-icon", "image-png"] }
tauri-plugin-shell = "2"
tauri-plugin-opener = "2"
tauri-plugin-dialog = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"
tokio = { version = "1", features = ["rt-multi-thread", "macros", "time", "net", "signal", "process"] }
reqwest = { version = "0.12", features = ["json"] }
once_cell = "1"
dirs = "5"
thiserror = "1"
url = "2"
clap = { version = "4", features = ["derive"] }
clap_complete = "4"
which = "6"
window-vibrancy = { version = "0.5", optional = false }
console = "0.15"
sysinfo = "0.30"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
x509-parser = "0.16"
libc = "0.2"
ed25519-dalek = "2"
base64 = "0.22"
keyring = { version = "3", features = ["apple-native"] }
aes-gcm = "0.10"

# Official Rust MCP SDK. Optional — only pulled in for the `portbay-mcp`
# bin via the `mcp` feature. `schemars` is enabled so we can derive the
# JSON Schema agents read; rmcp re-exports it (`rmcp::schemars`) so the
# version always matches the SDK's expectation. stdio transport only —
# no HTTP/axum surface.
rmcp = { version = "1.7", features = [
    "server",
    "macros",
    "transport-io",
    "schemars",
], optional = true }

[dev-dependencies]
tempfile = "3"
