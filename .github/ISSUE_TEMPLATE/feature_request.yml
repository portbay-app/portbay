name: Feature request
description: Propose a focused PortBay improvement.
title: "[Feature]: "
labels: ["enhancement", "needs-triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow is blocked or slow today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the behavior, not just the implementation.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: dropdown
    id: user-type
    attributes:
      label: Who benefits?
      options:
        - Solo developer
        - Agency / multi-project developer
        - PHP developer
        - JavaScript developer
        - Maintainer / release engineering
        - Other
