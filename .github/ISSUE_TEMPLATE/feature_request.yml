name: Feature request
description: Propose a focused PortBay improvement.
title: "[Feature]: "
labels: ["enhancement", "needs-triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow is blocked or slow today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the behavior, not just the implementation.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: dropdown
    id: user-type
    attributes:
      label: Who benefits?
      options:
        - Solo developer
        - Agency / multi-project developer
        - PHP developer
        - JavaScript developer
        - Maintainer / release engineering
        - Other
  - type: dropdown
    id: edition
    attributes:
      label: Community or Cloud/Pro?
      description: >
        Local-first features (managing local projects, ports, services, domains,
        HTTPS, logs) belong in Community. Hosted, multi-device, team, or billing
        features (sync, cloud backups, remote tunnels, org controls) belong in
        PortBay Cloud/Pro, which is developed separately. Unsure is fine —
        maintainers will help place it.
      options:
        - Community (local-first)
        - Cloud / Pro (hosted / team)
        - Unsure
    validations:
      required: true
  - type: textarea
    id: local-dev-fit
    attributes:
      label: How does this help local development workflows?
      description: Tie the request to the day-to-day of running projects locally.
    validations:
      required: true
