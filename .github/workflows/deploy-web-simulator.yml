name: Deploy web simulator

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-web-simulator-${{ github.ref }}
  cancel-in-progress: true

env:
  # wrangler >= 4 requires Node.js >= 22; Node 20 is also deprecated on runners.
  NODE_VERSION: "22"
  PNPM_VERSION: "10"

jobs:
  deploy:
    name: try.portbay.app
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: try-portbay-app
      url: https://try.portbay.app
    steps:
      - uses: actions/checkout@v7

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Install Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build hosted simulator
        run: pnpm build:web

      - name: Deploy hosted simulator
        run: pnpm exec wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
