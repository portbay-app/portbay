# PortBay release — fires on `vX.Y.Z` tags.
#
# Builds a signed + notarised .app, attaches the .dmg + tarball to a
# GitHub Release, and emits the `latest.json` updater manifest the
# Tauri Updater plugin reads.
#
# **Gated on the Developer ID Application cert + notarytool credentials
# being present in repo secrets.** Until that card lands, this workflow
# is skipped automatically (see the `if:` guard on every job) and the
# release process stays manual on the maintainer's laptop. Once the
# secrets are populated, remove the guard.

name: release

on:
  push:
    tags:
      - "v*.*.*"

env:
  CARGO_INCREMENTAL: "0"
  CARGO_NET_RETRY: "10"
  RUSTUP_MAX_RETRIES: "10"
  CARGO_TERM_COLOR: "always"
  CLICOLOR_FORCE: "1"
  RUST_TOOLCHAIN: "stable"
  NODE_VERSION: "20"
  PNPM_VERSION: "10"

jobs:
  build-and-sign:
    name: build · sign · notarise (macOS arm64)
    runs-on: macos-14
    # Skip the entire job until the signing credentials exist.
    # Replace this guard with `if: github.repository == 'portbay-app/portbay'`
    # (or similar) once `APPLE_CERTIFICATE` is populated in repo
    # secrets via the Developer ID cert card.
    if: vars.RELEASE_SIGNING_ENABLED == 'true'
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Install Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: pnpm install
        run: pnpm install --frozen-lockfile

      - name: Fetch sidecar binaries
        run: |
          ./scripts/fetch-process-compose.sh
          ./scripts/fetch-caddy.sh
          ./scripts/fetch-mkcert.sh
          ./scripts/fetch-mailpit.sh
          ./scripts/fetch-cloudflared.sh
          ./scripts/fetch-dnsmasq.sh

      - name: Build privileged hosts helper (bundled sidecar)
        env:
          # Match the architecture `tauri build` targets below so the bundled
          # helper is the right arch.
          TARGET_TRIPLE: aarch64-apple-darwin
        run: ./scripts/build-hosts-helper.sh

      - name: Build MCP server (bundled sidecar)
        env:
          # tauri.conf.json lists binaries/portbay-mcp as an externalBin, so the
          # real binary must exist before the bundle step copies it into the
          # .app. Same arch as the signed build below.
          TARGET_TRIPLE: aarch64-apple-darwin
        run: ./scripts/build-mcp.sh

      - name: Build Apple Intelligence bridge (bundled sidecar)
        env:
          # tauri.macos.conf.json lists binaries/portbay-afm as a macOS-only
          # externalBin (Smart Dictation's on-device rewrite provider). NOTE:
          # the sidecar only gains FoundationModels support when the runner's
          # SDK is macOS 26+; on an older SDK it still builds and cleanly
          # reports "built_without_sdk" at runtime.
          TARGET_TRIPLE: aarch64-apple-darwin
        run: ./scripts/build-afm.sh

      - name: Cache SwiftPM build (speech-to-text sidecar)
        uses: actions/cache@v5
        with:
          path: src-tauri/stt/.build
          key: ${{ runner.os }}-swiftpm-stt-${{ hashFiles('src-tauri/stt/Package.swift') }}
          restore-keys: |
            ${{ runner.os }}-swiftpm-stt-

      - name: Build speech-to-text sidecar (bundled sidecar)
        env:
          # tauri.macos.conf.json lists binaries/portbay-stt as a macOS-only
          # externalBin — Smart Dictation's local transcription engine
          # (Whisper via WhisperKit + Parakeet via FluidAudio, SwiftPM
          # package at src-tauri/stt). Needs a macOS 14+ SDK.
          TARGET_TRIPLE: aarch64-apple-darwin
        run: ./scripts/build-stt.sh

      - name: Cache SwiftPM build (image-generation sidecar)
        uses: actions/cache@v5
        with:
          path: src-tauri/imagegen/.build
          key: ${{ runner.os }}-swiftpm-imagegen-${{ hashFiles('src-tauri/imagegen/Package.swift') }}
          restore-keys: |
            ${{ runner.os }}-swiftpm-imagegen-

      - name: Build image-generation sidecar (bundled sidecar)
        env:
          # tauri.macos.conf.json lists binaries/portbay-imagegen as a
          # macOS-only externalBin (on-device diffusion via
          # apple/ml-stable-diffusion). WITHOUT this step the zero-byte
          # placeholder build-stt.sh seeds for the bundler's existence check
          # ships as-is — the app degrades to "sidecar_missing" and every
          # auto-updating user silently loses image generation.
          TARGET_TRIPLE: aarch64-apple-darwin
        run: ./scripts/build-imagegen.sh

      - name: Generate Cargo SBOM
        run: |
          cargo install cargo-cyclonedx --locked
          mkdir -p src-tauri/artifacts
          cd src-tauri
          cargo cyclonedx --format json --override-filename portbay-cargo-sbom.cdx
          mv portbay-cargo-sbom.cdx.json artifacts/portbay-cargo-sbom.cdx.json
          find crates -name portbay-cargo-sbom.cdx.json -delete

      # notarytool authenticates with the App Store Connect API key (.p8).
      # The key content lives in the APPLE_API_KEY_P8 secret; we materialise
      # it to a file and point APPLE_API_KEY_PATH at it. (This is the .p8
      # method — not the Apple-ID + app-specific-password method.)
      - name: Write App Store Connect API key
        run: |
          mkdir -p "$RUNNER_TEMP/private_keys"
          printf '%s' "${{ secrets.APPLE_API_KEY_P8 }}" > "$RUNNER_TEMP/private_keys/AuthKey.p8"

      # The macOS 26 Liquid Glass icon (Icon Composer) is wired into the bundle
      # statically: the compiled catalog lives at
      # src-tauri/icons/macos-liquid-glass/compiled/Assets.car and is registered
      # as a bundle resource in tauri.conf.json, with CFBundleIconName set in
      # src-tauri/Info.plist (Tauri v2 merges it). So `tauri build` below bakes,
      # signs and notarises it with no pre-build step and no Xcode 26 on the
      # runner. To refresh the catalog run scripts/prepare-macos-liquid-glass-icon.sh
      # locally and commit the result. See
      # src-tauri/icons/macos-liquid-glass/README.md.

      - name: Build signed app
        env:
          # Developer ID Application cert (base64-encoded .p12), unwrapped
          # into a temporary keychain by the Tauri action.
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # notarytool credentials — App Store Connect API key (.p8) method.
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_PATH: ${{ runner.temp }}/private_keys/AuthKey.p8
          # Tauri Updater plugin signature.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: pnpm tauri build --target aarch64-apple-darwin --bundles app,dmg

      # Tauri notarizes + staples the .app, then wraps it in a DMG it signs but
      # does NOT notarize. A quarantined DMG download then trips Gatekeeper at
      # mount ("unnotarized Developer ID"). Notarize + staple the DMG itself so
      # the downloaded artifact clears Gatekeeper. Must run before the artifact
      # upload below so the stapled DMG is what ships and what the Homebrew
      # cask SHA-256 is computed from. Reuses the .p8 materialised above.
      - name: Notarize and staple the DMG
        env:
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_PATH: ${{ runner.temp }}/private_keys/AuthKey.p8
        run: |
          set -euo pipefail
          dmg="$(find src-tauri/target/aarch64-apple-darwin/release/bundle/dmg -name '*.dmg' | head -n 1)"
          if [ -z "$dmg" ]; then
            echo "::error::No .dmg produced by the build; cannot notarize."
            exit 1
          fi
          echo "Notarizing $dmg"
          xcrun notarytool submit "$dmg" \
            --key "$APPLE_API_KEY_PATH" \
            --key-id "$APPLE_API_KEY" \
            --issuer "$APPLE_API_ISSUER" \
            --wait
          xcrun stapler staple "$dmg"
          xcrun stapler validate "$dmg"
          spctl -a -t open --context context:primary-signature -vv "$dmg"

      # Guards the installer-size positioning claim (docs/ARCHITECTURE.md
      # bundle-size budget). A regression — a stray dependency, an un-stripped
      # binary, an extra bundled sidecar — fails the release here instead of
      # surfacing as a user complaint. Budget is the compressed DMG, not the
      # uncompressed .app. Raised from 100 MB to 130 MB when the AI sidecars
      # (portbay-stt, portbay-imagegen) joined the bundle (~114 MB observed);
      # see docs/PERFORMANCE.md for the claw-back levers.
      - name: Guard DMG size budget (<130 MB)
        run: |
          dmg="$(find src-tauri/target/aarch64-apple-darwin/release/bundle/dmg -name '*.dmg' | head -n 1)"
          if [ -z "$dmg" ]; then
            echo "::error::No .dmg produced by the build; cannot check the size budget."
            exit 1
          fi
          bytes=$(stat -f%z "$dmg")
          budget=$((130 * 1024 * 1024))
          mb=$(echo "scale=1; $bytes / 1048576" | bc)
          echo "DMG: $(basename "$dmg") — ${mb} MB (budget 130 MB, baseline ~114 MB with AI sidecars)"
          if [ "$bytes" -gt "$budget" ]; then
            echo "::error::DMG installer is ${mb} MB, over the 130 MB budget. See docs/PERFORMANCE.md for the levers to claw it back."
            exit 1
          fi
          echo "::notice::DMG installer ${mb} MB — under the 130 MB budget."

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: portbay-macos-arm64
          path: |
            src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
            src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app.tar.gz
            src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app.tar.gz.sig
            src-tauri/artifacts/portbay-cargo-sbom.cdx.json
          retention-days: 14
          if-no-files-found: warn

  build-linux:
    name: build · Linux x86_64
    runs-on: ubuntu-22.04
    if: vars.RELEASE_SIGNING_ENABLED == 'true'
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libdbus-1-dev \
            libsecret-1-dev \
            dnsmasq \
            libnotify-bin \
            policykit-1 \
            rpm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Install Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: pnpm install
        run: pnpm install --frozen-lockfile

      - name: Fetch Linux sidecar binaries
        run: |
          ./scripts/fetch-process-compose.sh
          ./scripts/fetch-caddy.sh
          ./scripts/fetch-mkcert.sh
          ./scripts/fetch-mailpit.sh
          ./scripts/fetch-cloudflared.sh
          ./scripts/fetch-dnsmasq.sh

      - name: Build Linux helper sidecars
        run: |
          ./scripts/build-hosts-helper.sh
          ./scripts/build-mcp.sh

      - name: Build Linux bundles
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: pnpm tauri build --bundles appimage,deb,rpm

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v7
        with:
          name: portbay-linux-x86_64
          path: |
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/appimage/*.AppImage.tar.gz
            src-tauri/target/release/bundle/appimage/*.AppImage.tar.gz.sig
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/rpm/*.rpm
          retention-days: 14
          if-no-files-found: warn

  build-snap:
    name: build · Snap amd64
    runs-on: ubuntu-22.04
    needs: [build-linux, publish-release]
    if: vars.RELEASE_SIGNING_ENABLED == 'true' && vars.SNAP_BUILD_ENABLED == 'true'
    permissions:
      contents: write
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6

      - name: Download Linux deb artifact
        uses: actions/download-artifact@v8
        with:
          name: portbay-linux-x86_64
          path: artifacts/

      - name: Install Snapcraft
        run: |
          sudo snap install core22
          sudo snap install snapcraft --classic

      - name: Prepare snap source deb
        run: |
          set -euo pipefail
          deb="$(find artifacts -type f -name '*.deb' | head -n 1)"
          if [ -z "$deb" ]; then
            echo "::error::No deb artifact found for Snap build."
            exit 1
          fi
          cp "$deb" portbay.deb

      - name: Build snap
        run: snapcraft --destructive-mode

      - name: Upload Snap artifact
        uses: actions/upload-artifact@v7
        with:
          name: portbay-snap-amd64
          path: "*.snap"
          retention-days: 14
          if-no-files-found: error

      - name: Attach snap to draft release
        # Same manual-release guard as publish-release: never attach a
        # main-built snap to a release the maintainer published by hand.
        if: needs.publish-release.outputs.skipped != 'true'
        uses: softprops/action-gh-release@v3
        with:
          files: "*.snap"
          draft: true

  publish-release:
    name: publish · GitHub Release + updater manifest
    needs: [build-and-sign, build-linux]
    runs-on: ubuntu-latest
    if: vars.RELEASE_SIGNING_ENABLED == 'true'
    permissions:
      contents: write
    outputs:
      skipped: ${{ steps.manual.outputs.skip }}
    steps:
      - uses: actions/checkout@v6

      # GUARD: the maintainer's local release flow (scripts/release-dmg-local.sh
      # + `gh release create vX.Y.Z`) publishes this tag's release with locally
      # notarized + stapled assets, and the tag push that creates triggers THIS
      # run — which then finishes ~20 minutes later and would silently clobber
      # those assets with a build of whatever `main` holds (last writer wins;
      # this shipped stale binaries on v0.1.3). A release that is already
      # PUBLISHED for this tag therefore wins: leave it untouched. CI's own
      # releases are created as drafts (below), and the releases/tags/ endpoint
      # never returns drafts, so re-runs of this workflow are unaffected.
      - name: Skip if a release was already published manually
        id: manual
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          if assets="$(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${GITHUB_REF_NAME}" \
                --jq '[.assets[].name] | join(", ")' 2>/dev/null)"; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice::A published release already exists for ${GITHUB_REF_NAME} (assets: ${assets:-none}). Skipping publish so the manually released assets are not overwritten."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download artifacts
        if: steps.manual.outputs.skip != 'true'
        uses: actions/download-artifact@v8
        with:
          path: artifacts/

      # Tauri emits the macOS updater tarball as an unversioned
      # `PortBay.app.tar.gz` — rename it (and its .sig) so the asset a user
      # downloads identifies its version (v0.1.4 shipped versionless). Runs
      # BEFORE latest.json assembly so the manifest references the new name.
      - name: Version-name macOS updater tarball
        if: steps.manual.outputs.skip != 'true'
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          tarball="$(find artifacts -type f -name '*.app.tar.gz' | head -n 1)"
          if [ -n "$tarball" ] && [[ "$(basename "$tarball")" != *"$version"* ]]; then
            dir="$(dirname "$tarball")"
            mv "$tarball" "${dir}/PortBay_${version}_aarch64.app.tar.gz"
            if [ -f "${tarball}.sig" ]; then
              mv "${tarball}.sig" "${dir}/PortBay_${version}_aarch64.app.tar.gz.sig"
            fi
            echo "Renamed $(basename "$tarball") -> PortBay_${version}_aarch64.app.tar.gz"
          fi

      # Assemble the Tauri Updater manifest (`latest.json`) the in-app updater
      # reads from `releases/latest/download/latest.json`. The `signature`
      # field is the verbatim contents of the `.app.tar.gz.sig` minisign file
      # the bundler emitted (createUpdaterArtifacts), and `url` points at the
      # tarball asset on this release. The client verifies that signature
      # against the pubkey baked into tauri.conf.json before installing.
      - name: Assemble latest.json (updater manifest)
        if: steps.manual.outputs.skip != 'true'
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          mac_tarball="$(find artifacts -type f -name '*.app.tar.gz' | head -n 1)"
          mac_sig="$(find artifacts -type f -name '*.app.tar.gz.sig' | head -n 1)"
          linux_tarball="$(find artifacts -type f -name '*.AppImage.tar.gz' | head -n 1)"
          linux_sig="$(find artifacts -type f -name '*.AppImage.tar.gz.sig' | head -n 1)"
          if [ -z "$mac_tarball" ] || [ -z "$mac_sig" ]; then
            echo "::error::Updater artifacts missing (.app.tar.gz / .sig). Is bundle.createUpdaterArtifacts enabled and TAURI_SIGNING_PRIVATE_KEY set?"
            exit 1
          fi
          mac_asset="$(basename "$mac_tarball")"
          mac_signature="$(cat "$mac_sig")"
          mac_url="https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/${mac_asset}"
          pub_date="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          min_version="${PORTBAY_UPDATER_MIN_VERSION:-0.1.2}"
          if [ -n "$linux_tarball" ] && [ -n "$linux_sig" ]; then
            linux_asset="$(basename "$linux_tarball")"
            linux_signature="$(cat "$linux_sig")"
            linux_url="https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/${linux_asset}"
            jq -n \
              --arg version "$version" \
              --arg min_version "$min_version" \
              --arg pub_date "$pub_date" \
              --arg mac_signature "$mac_signature" \
              --arg mac_url "$mac_url" \
              --arg linux_signature "$linux_signature" \
              --arg linux_url "$linux_url" \
              '{
                version: $version,
                min_version: $min_version,
                notes: "See the release notes on GitHub.",
                pub_date: $pub_date,
                platforms: {
                  "darwin-aarch64": { signature: $mac_signature, url: $mac_url },
                  "linux-x86_64": { signature: $linux_signature, url: $linux_url }
                }
              }' > artifacts/latest.json
          else
            jq -n \
            --arg version "$version" \
            --arg min_version "$min_version" \
            --arg pub_date "$pub_date" \
            --arg signature "$mac_signature" \
            --arg url "$mac_url" \
            '{
              version: $version,
              min_version: $min_version,
              notes: "See the release notes on GitHub.",
              pub_date: $pub_date,
              platforms: {
                "darwin-aarch64": { signature: $signature, url: $url }
              }
            }' > artifacts/latest.json
          fi
          echo "Wrote artifacts/latest.json for v$version:"
          cat artifacts/latest.json

      # Attach a version-independent DMG name so the website download link
      # (releases/latest/download/PortBay-macos-arm64.dmg) always resolves to
      # the newest build. The versioned DMG is still attached too.
      - name: Stable-name macOS DMG
        if: steps.manual.outputs.skip != 'true'
        shell: bash
        run: |
          set -euo pipefail
          dmg="$(find artifacts -type f -name '*.dmg' ! -name 'PortBay-macos-arm64.dmg' | head -n 1)"
          if [ -n "$dmg" ]; then
            cp "$dmg" artifacts/PortBay-macos-arm64.dmg
            echo "Copied $(basename "$dmg") -> PortBay-macos-arm64.dmg"
          else
            echo "::warning::No versioned DMG found to copy to the stable name."
          fi

      - name: Create release + attach updater manifest
        if: steps.manual.outputs.skip != 'true'
        uses: softprops/action-gh-release@v3
        with:
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.app.tar.gz
            artifacts/**/*.app.tar.gz.sig
            artifacts/**/*.AppImage
            artifacts/**/*.AppImage.tar.gz
            artifacts/**/*.AppImage.tar.gz.sig
            artifacts/**/*.deb
            artifacts/**/*.rpm
            artifacts/**/*.snap
            artifacts/**/portbay-cargo-sbom.cdx.json
            artifacts/latest.json
          draft: true
          generate_release_notes: true

      # NOTE: the release is created as a DRAFT for maintainer review. The
      # updater endpoint (releases/latest/download/latest.json) only resolves
      # once the release is PUBLISHED — publish it to roll the update out.

  update-homebrew-tap:
    name: publish · Homebrew cask PR
    needs: [publish-release]
    runs-on: ubuntu-latest
    if: vars.RELEASE_SIGNING_ENABLED == 'true'
    permissions:
      contents: read
    env:
      TAP_REPO: portbay-app/homebrew-portbay
    steps:
      - uses: actions/checkout@v6

      - name: Download release artifact
        if: needs.publish-release.outputs.skipped != 'true'
        uses: actions/download-artifact@v8
        with:
          name: portbay-macos-arm64
          path: artifacts/

      # When the release was published manually (see the guard in
      # publish-release), the cask must hash the DMG users actually download —
      # the maintainer's notarized asset — not this run's main-built artifact.
      - name: Download manually released DMG
        if: needs.publish-release.outputs.skipped == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts
          asset="$(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${GITHUB_REF_NAME}" \
            --jq '[.assets[].name | select(test("^PortBay_.*\\.dmg$"))][0] // empty')"
          if [ -z "$asset" ]; then
            echo "::error::No versioned DMG asset on the published ${GITHUB_REF_NAME} release."
            exit 1
          fi
          gh release download "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" \
            --pattern "$asset" --dir artifacts

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          dmg="$(find artifacts -type f -name '*.dmg' | head -n 1)"
          if [ -z "$dmg" ]; then
            echo "::error::No DMG artifact found for Homebrew cask update."
            exit 1
          fi
          asset="$(basename "$dmg")"
          sha="$(shasum -a 256 "$dmg" | awk '{print $1}')"
          {
            echo "version=$version"
            echo "asset=$asset"
            echo "sha=$sha"
          } >> "$GITHUB_OUTPUT"

      - name: Checkout Homebrew tap
        uses: actions/checkout@v6
        with:
          repository: ${{ env.TAP_REPO }}
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-portbay

      - name: Render Cask
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p homebrew-portbay/Casks
          cat > homebrew-portbay/Casks/portbay.rb <<'RUBY'
          cask "portbay" do
            version "__VERSION__"
            sha256 "__SHA256__"

            url "https://github.com/portbay-app/portbay/releases/download/v#{version}/__ASSET__"
            name "PortBay"

            depends_on arch: :arm64
            # Matches tauri.conf.json minimumSystemVersion (11.0). The AI
            # features (dictation/STT/image generation) need macOS 14+, but
            # the app itself runs on Big Sur — don't gate the whole install
            # on the AI floor.
            depends_on macos: ">= :big_sur"
            desc "Lightweight local development environment manager"
            homepage "https://portbay.app"

            app "PortBay.app"
            binary "#{appdir}/PortBay.app/Contents/MacOS/portbay"

            zap trash: [
              "~/Library/Application Support/com.portbay-app.portbay",
              "~/Library/Application Support/PortBay",
              "~/Library/Caches/com.portbay-app.portbay",
              "~/Library/Logs/PortBay",
              "~/Library/Preferences/com.portbay-app.portbay.plist",
              "~/Library/WebKit/com.portbay-app.portbay",
            ]
          end
          RUBY
          sed -i \
            -e "s/__VERSION__/${{ steps.meta.outputs.version }}/g" \
            -e "s/__SHA256__/${{ steps.meta.outputs.sha }}/g" \
            -e "s/__ASSET__/${{ steps.meta.outputs.asset }}/g" \
            homebrew-portbay/Casks/portbay.rb

      - name: Create tap update PR
        id: cpr
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-portbay
          branch: release/portbay-${{ steps.meta.outputs.version }}
          commit-message: "Update PortBay cask to ${{ steps.meta.outputs.version }}"
          title: "Update PortBay cask to ${{ steps.meta.outputs.version }}"
          body: |
            Automated release update from `${{ github.repository }}@${{ github.ref_name }}`.

            - DMG: `${{ steps.meta.outputs.asset }}`
            - SHA-256: `${{ steps.meta.outputs.sha }}`
          labels: release, automated

      - name: Enable automerge for tap PR
        if: steps.cpr.outputs.pull-request-number != ''
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        working-directory: homebrew-portbay
        run: gh pr merge ${{ steps.cpr.outputs.pull-request-number }} --auto --squash

  update-aur-bin:
    name: publish · AUR portbay-bin
    needs: [publish-release]
    runs-on: ubuntu-latest
    if: vars.RELEASE_SIGNING_ENABLED == 'true' && vars.AUR_PUBLISH_ENABLED == 'true'
    permissions:
      contents: read
    env:
      AUR_REPO: ssh://aur@aur.archlinux.org/portbay-bin.git
    steps:
      - uses: actions/checkout@v6

      - name: Download Linux artifact
        uses: actions/download-artifact@v8
        with:
          name: portbay-linux-x86_64
          path: artifacts/

      - name: Resolve deb metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          deb="$(find artifacts -type f -name '*.deb' | head -n 1)"
          if [ -z "$deb" ]; then
            echo "::error::No deb artifact found for AUR update."
            exit 1
          fi
          asset="$(basename "$deb")"
          sha="$(sha256sum "$deb" | awk '{print $1}')"
          {
            echo "version=$version"
            echo "asset=$asset"
            echo "sha=$sha"
          } >> "$GITHUB_OUTPUT"

      - name: Configure AUR SSH
        env:
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "$AUR_SSH_PRIVATE_KEY" > ~/.ssh/aur
          chmod 600 ~/.ssh/aur
          ssh-keyscan aur.archlinux.org >> ~/.ssh/known_hosts
          printf '%s\n' \
            'Host aur.archlinux.org' \
            '  IdentityFile ~/.ssh/aur' \
            '  User aur' > ~/.ssh/config

      - name: Clone AUR repo
        run: git clone "$AUR_REPO" aur-portbay-bin

      - name: Render PKGBUILD and .SRCINFO
        shell: bash
        run: |
          set -euo pipefail
          cp packaging/aur/PKGBUILD aur-portbay-bin/PKGBUILD
          cp packaging/aur/.SRCINFO aur-portbay-bin/.SRCINFO
          url="https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/${{ steps.meta.outputs.asset }}"
          aur_source="portbay-bin-${{ steps.meta.outputs.version }}.deb::${url}"
          sed -i \
            -e "s/^pkgver=.*/pkgver=${{ steps.meta.outputs.version }}/" \
            -e "s#^source_x86_64=.*#source_x86_64=(\"${aur_source}\")#" \
            -e "s/^sha256sums_x86_64=.*/sha256sums_x86_64=('${{ steps.meta.outputs.sha }}')/" \
            aur-portbay-bin/PKGBUILD
          sed -i \
            -e "s/^\tpkgver = .*/\tpkgver = ${{ steps.meta.outputs.version }}/" \
            -e "s#^\tsource_x86_64 = .*#\tsource_x86_64 = ${aur_source}#" \
            -e "s/^\tsha256sums_x86_64 = .*/\tsha256sums_x86_64 = ${{ steps.meta.outputs.sha }}/" \
            aur-portbay-bin/.SRCINFO

      - name: Push AUR update
        working-directory: aur-portbay-bin
        run: |
          set -euo pipefail
          git config user.name "PortBay Release Bot"
          git config user.email "maintainers@portbay.app"
          if git diff --quiet; then
            echo "AUR package already up to date."
            exit 0
          fi
          git add PKGBUILD .SRCINFO
          git commit -m "Update PortBay to ${{ steps.meta.outputs.version }}"
          git push
