# PortBay CI — runs on every push to main and every PR.
#
# Three gates merge has to pass:
#   1. Rust: `cargo fmt --check`, `cargo clippy -- -D warnings`, `cargo test`.
#   2. Frontend: `pnpm check` (svelte-kit + svelte-check, 0 errors required).
#   3. Bundle smoke: `cargo tauri build --debug` so we catch packaging
#      regressions before they reach a release tag.
#
# Targets macos-14 (Apple Silicon) and Ubuntu for Linux desktop support.
#
# Sidecar binaries are fetched at the top of every job so the build
# doesn't depend on cached state from outside the repo. The fetch
# scripts in `scripts/` are the canonical install path; CI exercises
# them on every run.

name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Avoid running multiple workflows for the same PR head — newer pushes
# cancel older ones. Saves runner time and keeps the queue moving.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # Speeds up cargo by skipping the incremental-compile cache, which
  # GitHub-hosted runners can't benefit from anyway (each job is a
  # clean VM).
  CARGO_INCREMENTAL: "0"
  CARGO_NET_RETRY: "10"
  RUSTUP_MAX_RETRIES: "10"
  # Force colour in cargo / pnpm output so CI logs stay readable.
  CARGO_TERM_COLOR: "always"
  CLICOLOR_FORCE: "1"
  # Versions pinned here so CI is reproducible. Bump when bumping
  # locally too.
  RUST_TOOLCHAIN: "stable"
  NODE_VERSION: "20"
  PNPM_VERSION: "10"

jobs:
  rust:
    name: rust · fmt + clippy + test
    runs-on: macos-14
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: rustfmt, clippy

      - name: Cache cargo registry + target
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      # fetch-caddy.sh builds Caddy with the Cloudflare DNS module via xcaddy,
      # which needs Go. macOS runners don't ship Go, so install it first or the
      # whole "Fetch sidecar binaries" step fails before fmt/clippy/test run.
      - name: Install Go (for the xcaddy Caddy build)
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Fetch sidecar binaries
        run: |
          ./scripts/fetch-process-compose.sh
          ./scripts/fetch-caddy.sh
          ./scripts/fetch-mkcert.sh
          ./scripts/fetch-mailpit.sh
          ./scripts/fetch-cloudflared.sh
          ./scripts/fetch-dnsmasq.sh

      - name: Build privileged hosts helper
        # tauri.conf.json lists binaries/portbay-hosts-helper as an externalBin,
        # so the crate's build.rs fails the existence check unless it's present.
        # The bundle-smoke job does the same; clippy/test need it here too.
        run: ./scripts/build-hosts-helper.sh

      - name: cargo fmt --check
        working-directory: src-tauri
        run: |
          # rustfmt is cfg-blind: it errors resolving the Pro modules
          # (live_preview, context, tasks) whose source files ship only in the
          # private build. Check every tracked .rs except the two that declare
          # those absent modules — formatting is per-file, so coverage is intact.
          git ls-files '*.rs' \
            | grep -vE 'src/lib\.rs$|src/commands/mod\.rs$' \
            | xargs rustfmt --edition 2021 --check

      - name: cargo clippy -- -D warnings
        working-directory: src-tauri
        run: cargo clippy --all-targets --no-default-features -- -D warnings

      - name: cargo test --no-default-features
        working-directory: src-tauri
        # `--no-default-features` mirrors the Tauri default-dev flag the
        # Tauri CLI passes so test runs see the same feature set as
        # `pnpm tauri dev`.
        run: cargo test --no-default-features

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Coverage gate (line floor)
        working-directory: src-tauri
        # Gates the build: fails if line coverage on the default-feature lib
        # falls below the floor. Mirrors the test step's flags so the measured
        # surface matches what CI asserts. Baseline measured 2026-06-13 was
        # 46.99% lines / 48.91% regions; the floor sits a few points under it as
        # a regression ratchet — raise it toward the measured value as coverage
        # improves, but never above the current measurement or CI breaks. Full
        # HTML report locally: `cargo llvm-cov --lib --no-default-features --html`.
        run: cargo llvm-cov --lib --no-default-features --summary-only --fail-under-lines 43

  rust-linux:
    name: rust · linux compile + test
    runs-on: ubuntu-22.04
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v6

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libdbus-1-dev \
            libsecret-1-dev \
            dnsmasq \
            libnotify-bin \
            policykit-1 \
            rpm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: rustfmt, clippy

      - name: Cache cargo registry + target
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: linux-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            linux-cargo-

      - name: Fetch Linux sidecar binaries
        run: |
          ./scripts/fetch-process-compose.sh
          ./scripts/fetch-caddy.sh
          ./scripts/fetch-mkcert.sh
          ./scripts/fetch-mailpit.sh
          ./scripts/fetch-cloudflared.sh
          ./scripts/fetch-dnsmasq.sh

      - name: Build Linux hosts helper + MCP sidecars
        run: |
          ./scripts/build-hosts-helper.sh
          ./scripts/build-mcp.sh

      - name: cargo fmt --check
        working-directory: src-tauri
        run: |
          # rustfmt is cfg-blind: it errors resolving the Pro modules
          # (live_preview, context, tasks) whose source files ship only in the
          # private build. Check every tracked .rs except the two that declare
          # those absent modules — formatting is per-file, so coverage is intact.
          git ls-files '*.rs' \
            | grep -vE 'src/lib\.rs$|src/commands/mod\.rs$' \
            | xargs rustfmt --edition 2021 --check

      - name: cargo clippy -- -D warnings
        working-directory: src-tauri
        run: cargo clippy --all-targets --no-default-features -- -D warnings

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Coverage report (report-only, non-gating)
        working-directory: src-tauri
        run: cargo llvm-cov --lib --no-default-features --summary-only
        continue-on-error: true

      - name: cargo test --no-default-features
        working-directory: src-tauri
        run: cargo test --no-default-features

  tauri-e2e-linux:
    name: e2e · Tauri binary smoke
    needs: [rust-linux, frontend]
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libdbus-1-dev \
            libsecret-1-dev \
            dnsmasq \
            libnotify-bin \
            policykit-1 \
            rpm \
            webkit2gtk-driver \
            xvfb

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Install Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Cache cargo registry + target
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: linux-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            linux-cargo-

      - name: pnpm install
        run: pnpm install --frozen-lockfile

      - name: Fetch Linux sidecar binaries
        run: |
          ./scripts/fetch-process-compose.sh
          ./scripts/fetch-caddy.sh
          ./scripts/fetch-mkcert.sh
          ./scripts/fetch-mailpit.sh
          ./scripts/fetch-cloudflared.sh
          ./scripts/fetch-dnsmasq.sh

      - name: Build Linux hosts helper + MCP sidecars
        run: |
          ./scripts/build-hosts-helper.sh
          ./scripts/build-mcp.sh

      - name: Build Tauri app binary
        run: pnpm tauri build --debug --no-bundle

      - name: Launch Tauri binary under Xvfb
        run: |
          set -euo pipefail
          xvfb-run -a src-tauri/target/debug/portbay-app &
          app_pid=$!
          sleep 8
          if ! kill -0 "$app_pid" 2>/dev/null; then
            wait "$app_pid"
            exit 1
          fi
          kill "$app_pid"
          wait "$app_pid" || true

  frontend:
    name: frontend · check + test + build
    runs-on: macos-14
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Install Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: pnpm install
        run: pnpm install --frozen-lockfile

      - name: pnpm check (svelte-check)
        run: pnpm check

      - name: pnpm test (vitest)
        # Unit tests for the optimistic-lifecycle core — guards the
        # interaction-latency budget's stale-event resolution logic
        # (docs/PERFORMANCE.md). The end-to-end click-to-paint timing assertion
        # lives in the `e2e` job below.
        run: pnpm test

      - name: pnpm build
        run: pnpm build

      - name: pnpm build:web
        # Guards the hosted try.portbay.app simulator build. It uses the same
        # app routes/components with PUBLIC_SIMULATOR=true, so new pages and
        # refactors fail CI here if they drift from the desktop bundle.
        run: pnpm build:web

  e2e:
    name: e2e · interaction latency (optimistic lifecycle)
    runs-on: macos-14
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Install Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: pnpm install
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm exec playwright install chromium

      - name: pnpm test:e2e
        # Drives the real frontend build (the SPA the Tauri webview loads) in
        # headless Chromium and asserts the optimistic Play overlay paints
        # "Starting…" before the deliberately-slow mocked start_project IPC
        # resolves — the interaction-latency budget guard (docs/PERFORMANCE.md).
        # Tauri-binary WebDriver is Linux/Windows-only (no WKWebView driver on
        # macOS), and the optimistic flip is pure frontend, so the SPA build is
        # the faithful target here.
        run: pnpm test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  bundle-smoke:
    name: bundle · debug build
    needs: [rust, frontend]
    runs-on: macos-14
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Install Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Cache cargo registry + target
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: pnpm install
        run: pnpm install --frozen-lockfile

      # fetch-caddy.sh builds Caddy with the Cloudflare DNS module via xcaddy,
      # which needs Go. macOS runners don't ship Go, so install it first or the
      # whole "Fetch sidecar binaries" step fails before fmt/clippy/test run.
      - name: Install Go (for the xcaddy Caddy build)
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Fetch sidecar binaries
        run: |
          ./scripts/fetch-process-compose.sh
          ./scripts/fetch-caddy.sh
          ./scripts/fetch-mkcert.sh
          ./scripts/fetch-mailpit.sh
          ./scripts/fetch-cloudflared.sh
          ./scripts/fetch-dnsmasq.sh

      - name: Build privileged hosts helper (bundled sidecar)
        # tauri.conf.json lists binaries/portbay-hosts-helper as an externalBin,
        # so the file must exist (built from our own source) before the bundle
        # step can resolve it. Host triple — this smoke build is native.
        run: ./scripts/build-hosts-helper.sh

      - name: Build MCP server (bundled sidecar)
        # Same reason — binaries/portbay-mcp is an externalBin. Building it here
        # also verifies the crates/mcp workspace member + rmcp stack compile.
        run: ./scripts/build-mcp.sh

      - name: Build Apple Intelligence bridge (bundled sidecar)
        # binaries/portbay-afm is a macOS-only externalBin (tauri.macos.conf.json).
        # Verifies the Swift sidecar compiles; on a pre-26 SDK it builds the
        # canImport fallback that reports "built_without_sdk" at runtime.
        run: ./scripts/build-afm.sh

      - name: Cache SwiftPM build (speech-to-text sidecar)
        # WhisperKit + FluidAudio are heavy SwiftPM dependencies — a cold
        # build clones and compiles both (~1-2 min); the cache makes it
        # incremental.
        uses: actions/cache@v6
        with:
          path: src-tauri/stt/.build
          key: ${{ runner.os }}-swiftpm-stt-${{ hashFiles('src-tauri/stt/Package.swift') }}
          restore-keys: |
            ${{ runner.os }}-swiftpm-stt-

      - name: Build speech-to-text sidecar (bundled sidecar)
        # binaries/portbay-stt is a macOS-only externalBin (tauri.macos.conf.json):
        # Smart Dictation's local transcription engine (Whisper/Parakeet,
        # SwiftPM package at src-tauri/stt). Needs a macOS 14+ SDK.
        run: ./scripts/build-stt.sh

      - name: cargo tauri build --debug
        # Skips notarisation + signing; verifies the bundle layout is
        # still valid. Catches missing capabilities entries, broken
        # externalBin paths, etc., before a release tag does.
        run: pnpm tauri build --debug --no-bundle

  bundle-smoke-linux:
    name: bundle · linux debug build
    needs: [rust-linux, frontend]
    runs-on: ubuntu-22.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libdbus-1-dev \
            libsecret-1-dev \
            dnsmasq \
            libnotify-bin \
            policykit-1 \
            rpm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Install Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Cache cargo registry + target
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: linux-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            linux-cargo-

      - name: pnpm install
        run: pnpm install --frozen-lockfile

      - name: Fetch Linux sidecar binaries
        run: |
          ./scripts/fetch-process-compose.sh
          ./scripts/fetch-caddy.sh
          ./scripts/fetch-mkcert.sh
          ./scripts/fetch-mailpit.sh
          ./scripts/fetch-cloudflared.sh
          ./scripts/fetch-dnsmasq.sh

      - name: Build Linux hosts helper + MCP sidecars
        run: |
          ./scripts/build-hosts-helper.sh
          ./scripts/build-mcp.sh

      - name: cargo tauri build --debug
        run: pnpm tauri build --debug --no-bundle

  linux-package-metadata:
    name: package · Linux metadata
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Validate Linux package targets
        run: bash scripts/check-linux-packaging.sh
